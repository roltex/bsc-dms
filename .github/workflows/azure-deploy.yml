name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, xml, zip, gd, intl, bcmath, fileinfo
          tools: composer:v2

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install backend dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Create deployment package
        run: bash scripts/build-deploy-package.sh

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: deploy.zip
          startup-command: bash /home/site/wwwroot/infra/azure/startup.sh

      - name: Smoke test (health endpoint)
        run: |
          HOST="${{ vars.AZURE_WEBAPP_HOST || format('{0}.azurewebsites.net', vars.AZURE_WEBAPP_NAME) }}"
          URL="https://${HOST}/api/health"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after deploy"
          cat /tmp/health.json 2>/dev/null || true
          exit 1
