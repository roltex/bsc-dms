# Deploy EFES DMS to Azure App Service (Linux PHP 8.2)
# Project: https://dev.azure.com/posbsc/bsc-dms
# Requires: Azure Resource Manager service connection + App Service `bsc-dms` already provisioned

trigger:
  branches:
    include:
      - main
      - master

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  webAppName: bsc-dms
  phpVersion: 8.2
  nodeVersion: 20.x

stages:
  - stage: BuildAndDeploy
    displayName: Build and deploy
    jobs:
      - job: Deploy
        displayName: Deploy to App Service
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Install Node.js
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              cd frontend
              npm ci
              npm run build
            displayName: Build frontend

          - script: |
              sudo apt-get update -qq
              sudo apt-get install -y software-properties-common
              sudo add-apt-repository ppa:ondrej/php -y
              sudo apt-get update -qq
              sudo apt-get install -y php8.2-cli php8.2-mbstring php8.2-xml php8.2-zip php8.2-gd php8.2-intl php8.2-bcmath php8.2-mysql unzip curl
              curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
              php -v
              composer -V
            displayName: Install PHP 8.2 and Composer

          - script: |
              cd backend
              composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            displayName: Install backend dependencies

          - script: bash scripts/build-deploy-package.sh
            displayName: Create deploy.zip

          - task: AzureWebApp@1
            displayName: Deploy to Azure App Service
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: $(webAppName)
              package: $(System.DefaultWorkingDirectory)/deploy.zip
              runtimeStack: PHP|8.2
              startUpCommand: bash /home/site/wwwroot/infra/azure/startup.sh

          - script: |
              URL="https://$(webAppName).azurewebsites.net/api/health"
              echo "Checking $URL"
              for i in 1 2 3 4 5; do
                STATUS=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
                echo "Attempt $i: HTTP $STATUS"
                if [ "$STATUS" = "200" ]; then
                  cat /tmp/health.json
                  exit 0
                fi
                sleep 15
              done
              echo "Health check failed"
              cat /tmp/health.json 2>/dev/null || true
              exit 1
            displayName: Smoke test /api/health
